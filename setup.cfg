[flake8]
max-line-length = 100
exclude =
    venv/,
    .venv/,
    __pycache__/,
    .git/
extend-ignore =
    # E203: whitespace before ':' (black-compatible)
    E203,
    # W503: line break before binary operator (black-compatible)
    W503

[tool:pytest]
testpaths = tests
addopts = -v --tb=short
