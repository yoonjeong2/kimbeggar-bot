name: CI — Lint & Test

# Trigger on every push to main and on all pull requests targeting main.
# This ensures the main branch is always green and PRs are validated before merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]

    steps:
      # ----------------------------------------------------------------
      # 1. Check out source code
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Set up the requested Python version
      # ----------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ----------------------------------------------------------------
      # 3. Cache pip dependencies for faster subsequent runs
      # ----------------------------------------------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ----------------------------------------------------------------
      # 4. Install runtime + development dependencies
      # ----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # ----------------------------------------------------------------
      # 5. Format check — black
      #    Fails if any file would be reformatted by black.
      #    Configure line-length in setup.cfg [tool:black].
      # ----------------------------------------------------------------
      - name: Check formatting with black
        run: |
          black --check --diff .

      # ----------------------------------------------------------------
      # 6. Lint — flake8
      #    E501 (line too long) is governed by setup.cfg (max-line-length=100).
      #    The venv/ directory is excluded automatically via setup.cfg.
      # ----------------------------------------------------------------
      - name: Lint with flake8
        run: |
          flake8 . \
            --count \
            --statistics \
            --format="::error file=%(path)s,line=%(row)d,col=%(col)d::%(text)s"

      # ----------------------------------------------------------------
      # 7. Static analysis — pylint
      #    --fail-under=7.0 allows minor style issues while blocking
      #    real errors (undefined variables, wrong argument counts, etc.).
      #    Disabled checks are configured in setup.cfg [tool:pylint.*].
      # ----------------------------------------------------------------
      - name: Lint with pylint
        run: |
          pylint strategy/ notifier/ data_agent/ config/ backtest/ main.py \
            --fail-under=7.0 \
            --output-format=colorized
        continue-on-error: true

      # ----------------------------------------------------------------
      # 8. Test — pytest with coverage
      #    Tests do NOT require .env or live API credentials; all external
      #    dependencies are mocked in conftest.py / test files.
      # ----------------------------------------------------------------
      - name: Test with pytest
        run: |
          pytest tests/ \
            --cov=strategy \
            --cov=notifier \
            --cov=main \
            --cov=config \
            --cov=backtest \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      # ----------------------------------------------------------------
      # 9. Upload coverage report as an artifact (optional, for review)
      # ----------------------------------------------------------------
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
