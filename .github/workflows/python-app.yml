name: CI — Lint, Test & Docker

# Trigger on every push to main and on all pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ================================================================
  # Job 1: Lint + Test (Python)
  # ================================================================
  lint-and-test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]

    steps:
      # ----------------------------------------------------------------
      # 1. Check out source code
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Set up the requested Python version
      # ----------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ----------------------------------------------------------------
      # 3. Cache pip dependencies for faster subsequent runs
      # ----------------------------------------------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ----------------------------------------------------------------
      # 4. Install runtime + development dependencies
      # ----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # ----------------------------------------------------------------
      # 5. Format check — black (mandatory)
      # ----------------------------------------------------------------
      - name: Check formatting with black
        run: |
          black --check --diff .

      # ----------------------------------------------------------------
      # 6. Lint — flake8
      # ----------------------------------------------------------------
      - name: Lint with flake8
        run: |
          flake8 . \
            --count \
            --statistics \
            --format="::error file=%(path)s,line=%(row)d,col=%(col)d::%(text)s"

      # ----------------------------------------------------------------
      # 7. Static analysis — pylint (informational; does not block merge)
      # ----------------------------------------------------------------
      - name: Lint with pylint
        run: |
          pylint strategy/ notifier/ data_agent/ config/ backtest/ main.py \
            --fail-under=7.0 \
            --output-format=colorized
        continue-on-error: true

      # ----------------------------------------------------------------
      # 8. Test — pytest with coverage (80 % minimum enforced)
      # ----------------------------------------------------------------
      - name: Test with pytest
        run: |
          pytest tests/ \
            --cov=strategy \
            --cov=notifier \
            --cov=main \
            --cov=config \
            --cov=backtest \
            --cov=data_agent \
            --cov=logger \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      # ----------------------------------------------------------------
      # 9. Upload coverage report as an artifact
      # ----------------------------------------------------------------
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

      # ----------------------------------------------------------------
      # 10. Upload coverage to Codecov
      #     Set CODECOV_TOKEN in repository Settings → Secrets.
      #     Token is optional for public repos but recommended.
      # ----------------------------------------------------------------
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          name: kimbeggar-${{ matrix.python-version }}
          fail_ci_if_error: false

  # ================================================================
  # Job 2: Docker build (runs after lint-and-test succeeds)
  # ================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      # ----------------------------------------------------------------
      # 1. Check out source code
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Build Docker image
      #    Verifies the Dockerfile is valid and all dependencies install.
      #    Image is not pushed (no registry credentials required for CI).
      # ----------------------------------------------------------------
      - name: Build Docker image
        run: |
          docker build -t kimbeggar:${{ github.sha }} .
          echo "✓ Docker build succeeded: kimbeggar:${{ github.sha }}"

      # ----------------------------------------------------------------
      # 3. Deploy to Render
      #    Triggers a Render deploy webhook only on pushes to main.
      #    Set RENDER_DEPLOY_HOOK in repository Settings → Secrets.
      # ----------------------------------------------------------------
      - name: Deploy to Render
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          secrets.RENDER_DEPLOY_HOOK != ''
        run: |
          curl --silent --show-error --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✓ Render deploy webhook triggered."

      # ----------------------------------------------------------------
      # 4. Deploy to Heroku (optional)
      #    Activated only when HEROKU_API_KEY and HEROKU_APP_NAME secrets
      #    are configured.  Uses heroku.yml (Container Registry) so the
      #    same Dockerfile that passes CI is deployed to production.
      #
      #    Required secrets:
      #      HEROKU_API_KEY   — from https://dashboard.heroku.com/account
      #      HEROKU_APP_NAME  — your Heroku app name (e.g. "kimbeggar-prod")
      #      HEROKU_EMAIL     — Heroku account e-mail address
      # ----------------------------------------------------------------
      - name: Deploy to Heroku
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          secrets.HEROKU_API_KEY != ''
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: true
